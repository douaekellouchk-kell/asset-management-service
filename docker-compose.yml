version: '3.8'

services:
  db:
    image: postgres:15
    container_name: asset-db
    environment:
      POSTGRES_USER: pfa_user
      POSTGRES_PASSWORD: pfa_password
      POSTGRES_DB: asset_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asset-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfa_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: asset-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pfa_user:pfa_password@db:5432/asset_db
      SECRET_KEY: your-secret-key-change-in-production-min-32-chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - asset-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  asset-network:
    driver: bridge