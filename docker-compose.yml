version: '3.8'

services:
  db:
    image: postgres:15
    container_name: asset-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-asset_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-asset_password}
      POSTGRES_DB: ${POSTGRES_DB:-asset_management}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - asset-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-asset_user} -d ${POSTGRES_DB:-asset_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: asset-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - asset-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  asset-network:
    driver: bridge